<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" role="img" aria-labelledby="title desc">
  <title id="title">Leader election diagram for the order executor replicas</title>
  <desc id="desc">Sequence-style diagram showing a bully-style leader election at startup and failover after executor 3 stops, with only the leader dequeuing from the order queue.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 16px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .lane-head { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 2; rx: 14; }
      .queue-head { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .lane-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .lane-line { stroke: #cbd5e1; stroke-width: 4; }
      .phase { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .phase-line { stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 8 8; }
      .event { fill: #ffffff; stroke: #475569; stroke-width: 2; rx: 12; }
      .event-leader { fill: #ecfccb; stroke: #65a30d; stroke-width: 2; rx: 12; }
      .event-fail { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 12; }
      .event-note { fill: #fffbeb; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .box-title { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #111827; text-anchor: middle; }
      .box-sub { font: 14px 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .heartbeat { stroke: #0ea5e9; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 9 6; }
      .separator { stroke: #ef4444; stroke-width: 4; }
      .small { font: 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="960" />

  <text class="title" x="60" y="48">Leader election and single-consumer execution</text>
  <text class="subtitle" x="60" y="78">The executor replicas use a bully-style election. Only the current leader is allowed to dequeue from the order queue.</text>

  <rect class="lane-head" x="70" y="110" width="180" height="48" />
  <rect class="lane-head" x="330" y="110" width="180" height="48" />
  <rect class="lane-head" x="590" y="110" width="180" height="48" />
  <rect class="queue-head" x="870" y="110" width="220" height="48" />

  <text class="lane-title" x="160" y="141">Executor 1</text>
  <text class="lane-title" x="420" y="141">Executor 2</text>
  <text class="lane-title" x="680" y="141">Executor 3</text>
  <text class="lane-title" x="980" y="141">Order Queue</text>

  <line class="lane-line" x1="160" y1="160" x2="160" y2="920" />
  <line class="lane-line" x1="420" y1="160" x2="420" y2="920" />
  <line class="lane-line" x1="680" y1="160" x2="680" y2="920" />
  <line class="lane-line" x1="980" y1="160" x2="980" y2="920" />

  <text class="phase" x="60" y="200">Phase 1: startup election</text>

  <path class="arrow" d="M160 230 L420 230" />
  <text class="small" x="250" y="218">Election(1)</text>

  <path class="arrow" d="M160 270 L680 270" />
  <text class="small" x="400" y="258">Election(1)</text>

  <path class="arrow" d="M420 310 L680 310" />
  <text class="small" x="510" y="298">Election(2)</text>

  <rect class="event-leader" x="590" y="340" width="180" height="74" />
  <text class="box-title" x="680" y="368">Executor 3 becomes leader</text>
  <text class="box-sub" x="680" y="390">highest live id wins</text>

  <path class="arrow" d="M680 430 L160 430" />
  <text class="small" x="350" y="418">Coordinator(3)</text>

  <path class="arrow" d="M680 470 L420 470" />
  <text class="small" x="520" y="458">Coordinator(3)</text>

  <path class="heartbeat" d="M680 515 L160 515" />
  <path class="heartbeat" d="M680 545 L420 545" />
  <text class="small" x="735" y="532">heartbeats every 2s</text>

  <path class="arrow" d="M680 590 L980 590" />
  <text class="small" x="785" y="578">leader dequeues approved order</text>

  <line class="phase-line" x1="60" y1="640" x2="1140" y2="640" />
  <text class="phase" x="60" y="675">Phase 2: failover after executor 3 stops</text>

  <rect class="event-fail" x="590" y="700" width="180" height="74" />
  <text class="box-title" x="680" y="728">Executor 3 stops</text>
  <text class="box-sub" x="680" y="750">followers stop receiving heartbeats</text>
  <line class="separator" x1="610" y1="712" x2="750" y2="762" />
  <line class="separator" x1="750" y1="712" x2="610" y2="762" />

  <rect class="event" x="70" y="710" width="180" height="60" />
  <text class="box-title" x="160" y="736">Timeout detected</text>
  <text class="box-sub" x="160" y="756">Executor 1 starts election</text>

  <path class="arrow" d="M160 805 L420 805" />
  <text class="small" x="250" y="793">Election(1)</text>

  <rect class="event-leader" x="330" y="780" width="180" height="82" />
  <text class="box-title" x="420" y="808">Executor 2 becomes leader</text>
  <text class="box-sub" x="420" y="830">no higher live peer answers</text>
  <text class="box-sub" x="420" y="848">Coordinator(2) follows</text>

  <path class="arrow" d="M420 885 L160 885" />
  <text class="small" x="255" y="873">Coordinator(2)</text>

  <path class="arrow" d="M420 915 L980 915" />
  <text class="small" x="650" y="903">new leader dequeues the next approved order</text>

  <rect class="event-note" x="870" y="700" width="250" height="86" />
  <text class="box-title" x="995" y="728">Mutual exclusion</text>
  <text class="box-sub" x="995" y="750">Only the leader calls `Dequeue`.</text>
  <text class="box-sub" x="995" y="770">That is why one approved order</text>
  <text class="box-sub" x="995" y="788">is executed only once.</text>

  <rect class="event-note" x="870" y="805" width="250" height="86" />
  <text class="box-title" x="995" y="833">Failure assumption</text>
  <text class="box-sub" x="995" y="855">Crash-stop failures, 5s timeout,</text>
  <text class="box-sub" x="995" y="875">and simple heartbeat-based recovery.</text>
</svg>
