syntax = "proto3";

package fraud_detection;

import "google/protobuf/empty.proto";

service FraudDetectionService {
    rpc initOrder (InitRequest) returns (google.protobuf.Empty);
    rpc bookCheck (BookCheckRequest) returns (google.protobuf.Empty); // called by orchestrator
    rpc userCheck (UserCheckRequest) returns (google.protobuf.Empty); // is called by transaction verification and fraud detection itself. only processes when both have arrived and vector clock is correct.
}

message OdrerData { // duplicated across all proto files
    string card_nr = 1;
    float order_ammount = 2;
}

message VectorClock {
    map<string, uint64> values = 1;
}

message InitRequest {
    int64 order_id = 1;
    OdrerData orderData = 2;
}

message BookCheckRequest { // called by orchestrator
    int64 order_id = 1;
}

message UserCheckRequest {
    int64 order_id = 1;
    VectorClock clock = 2;

}
