syntax = "proto3";

package fraud_detection;

service FraudDetectionService {

  rpc CheckFraud (FraudCheckRequest) returns (FraudCheckResponse);
  rpc TriggerFraudCheck (TriggerRequest) returns (FraudCheckResponse);
  rpc GetVectorClock (VectorClockRequest) returns (VectorClockResponse);
  rpc ClearOrder (ClearOrderRequest) returns (ClearOrderResponse);
}

message FraudCheckRequest {
  string order_id = 1;
  string user_name = 2;
  string card_number = 3;
  int32 item_count = 4;
}

message FraudCheckResponse {
  bool is_fraud = 1;
  string message = 2;
  bool failed = 3;
}

message TriggerRequest {
  string order_id = 1;
  string event_type = 2;
}

message VectorClockRequest {
  string order_id = 1;
}

message VectorClockResponse {
  int32 fraud_detection = 1;
  int32 fd_event_d = 2;
  int32 fd_event_e = 3;
  int32 transaction_verification = 4;
  int32 tv_event_a = 5;
  int32 tv_event_b = 6;
  int32 tv_event_c = 7;
  int32 suggestions = 8;
}

message ClearOrderRequest {
  string order_id = 1;
  int32 final_vc_fraud_detection = 2;
  int32 final_vc_fd_event_d = 3;
  int32 final_vc_fd_event_e = 4;
  int32 final_vc_transaction_verification = 5;
  int32 final_vc_tv_event_a = 6;
  int32 final_vc_tv_event_b = 7;
  int32 final_vc_tv_event_c = 8;
  int32 final_vc_suggestions = 9;
}

message ClearOrderResponse {
  bool success = 1;
  string message = 2;
}