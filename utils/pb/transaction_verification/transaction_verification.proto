syntax = "proto3";

package transaction;

service TransactionVerificationService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);

    // Orchestrator starts the whole workflow here
    rpc StartCheckoutFlow (StartCheckoutFlowRequest) returns (StartCheckoutFlowResponse);

    // Final result is reported back here
    rpc FinalizeOrder (FinalizeOrderRequest) returns (Ack);

    // orchestrator broadcasts final cleanup after checkout flow ends
    rpc CleanupOrder (CleanupOrderRequest) returns (CleanupOrderResponse);
}

message InitOrderRequest {
    string order_id = 1;
    string order_payload_json = 2;
    repeated int32 vector_clock = 3;
}

message InitOrderResponse {
    bool acknowledged = 1;
}

message Ack {
    bool ok = 1;
}

message StartCheckoutFlowRequest {
    string order_id = 1;
}

message BookSuggestion {
    string title = 1;
    string author = 2;
}

message StartCheckoutFlowResponse {
    bool success = 1;
    string message = 2;
    repeated int32 vector_clock = 3;
    repeated BookSuggestion suggestions = 4;
}

message FinalizeOrderRequest {
    string order_id = 1;
    bool success = 2;
    string message = 3;
    repeated int32 vector_clock = 4;
    repeated BookSuggestion suggestions = 5;
}

message CleanupOrderRequest {
    string order_id = 1;
    repeated int32 final_vector_clock = 2;
}

message CleanupOrderResponse {
    bool cleaned = 1;
    bool vc_valid = 2;
    string message = 3;
    repeated int32 local_vector_clock = 4;
}