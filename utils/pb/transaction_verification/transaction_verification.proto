syntax = "proto3";

import "google/protobuf/empty.proto";

package transaction_verification;

service TransactionVerificationService {
    rpc InitOrder (InitRequest) returns (google.protobuf.Empty);
    rpc UpdateClock (ClockUpdateRequest) returns (google.protobuf.Empty);
    rpc VerifyTransaction (VerifyRequest) returns (VerifyResponse);
}

message VectorClock {
    repeated int32 values = 1; // [Fraud, Verification, Suggestions]
}

message InitRequest {
    string order_id = 1;
    string item_json = 2; // The raw request data
}

message ClockUpdateRequest {
    string order_id = 1;
    VectorClock clock = 2;
}


message VerifyRequest {
    string order_id = 1;
    string user_name = 2;
    string contact = 3;
    string card_number = 4;
    string street = 5;
    string city = 6;
    string state = 7;
    string zip_code = 8;
    string country = 9;
    string shipping_method = 10;
    bool terms_accepted = 11;
}

message VerifyResponse {
    bool is_valid = 1;
}
