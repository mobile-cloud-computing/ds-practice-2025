// transaction.proto

syntax = "proto3";

package transaction;

service TransactionVerificationService {
    rpc VerifyTransaction (TransactionRequest) returns (TransactionVerificationResponse);
}

message TransactionRequest {
    string transaction_id = 1;
    double amount = 2;
    string currency = 3;
    }

message TransactionVerificationResponse {
    string status = 1;
    string message = 2;
    }