syntax = "proto3";

package transaction;

service TransactionVerificationService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);
    rpc VerifyTransaction (TransactionVerificationRequest) returns (TransactionVerificationResponse);
}

message InitOrderRequest {
    string order_id = 1;
    string order_payload_json = 2;
    map<string, int32> vector_clock = 3;
}

message InitOrderResponse {
    bool acknowledged = 1;
}


message UserData {
    string name = 1;
    string email = 2;
    string address = 3;
}

message Item {
    string name = 1;
    float quantity = 2;
}

message TransactionVerificationRequest {
    UserData user = 1;
    repeated Item items = 2;
    string card_number = 3;
    string card_expiry = 4;
    string card_cvv = 5;
    float order_amount = 6;
    string order_id = 7;
}

message TransactionVerificationResponse {
    bool is_verified = 1;
}
   
