syntax = "proto3";

package suggestions;

service SuggestionsService {
    rpc GetSuggestions (SuggestionsRequest) returns (SuggestionsResponse);
}

message SuggestionsRequest {
    repeated Item items = 1;
    string user_name = 2;
}

message Item {
    string name = 1;
    int32 quantity = 2;
}

message SuggestionsResponse {
    repeated Book books = 1;
}

message Book {
    string book_id = 1;
    string title = 2;
    string author = 3;
}
