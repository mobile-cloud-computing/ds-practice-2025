syntax = "proto3";

package suggestions;

service SuggestionsService {
    rpc InitOrder (InitOrderRequest) returns (InitOrderResponse);

    // fraud service notifies suggestions service that e completed
    rpc NotifyECompleted (DependencyNotificationRequest) returns (Ack);
}

message InitOrderRequest {
    string order_id = 1;
    string order_payload_json = 2;
    repeated int32 vector_clock = 3;
}

message InitOrderResponse {
    bool acknowledged = 1;
}

message Ack {
    bool ok = 1;
}

message DependencyNotificationRequest {
    string order_id = 1;
    string event_name = 2;
    repeated int32 vector_clock = 3;
}