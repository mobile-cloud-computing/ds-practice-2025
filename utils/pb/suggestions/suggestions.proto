syntax = "proto3";

package suggestions;

service SuggestionsService {
    rpc suggest (SuggestRequest) returns (SuggestResponse);
}

message Book {
    string bookId = 1;
    string title = 2;
    string author = 3;
}

message SuggestRequest {
    repeated string ordered_books = 1;
}

message SuggestResponse {
    repeated Book suggested_books = 1;
}