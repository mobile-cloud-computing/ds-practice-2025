syntax = "proto3";

package suggestions;

service SuggestionsService {
  rpc GetSuggestions (SuggestionsRequest) returns (SuggestionsResponse);
  rpc TriggerSuggestions (TriggerRequest) returns (SuggestionsResponse);
  rpc GetVectorClock (VectorClockRequest) returns (VectorClockResponse);
  rpc ClearOrder (ClearOrderRequest) returns (ClearOrderResponse);
}

message SuggestionsRequest {
  string order_id = 1;
  string user_name = 2;
  int32 item_count = 3;
}

message SuggestedBook {
  string bookId = 1;
  string title = 2;
  string author = 3;
}

message SuggestionsResponse {
  repeated SuggestedBook books = 1;
  bool failed = 2;
}

message TriggerRequest {
  string order_id = 1;
  string event_type = 2;
}

message VectorClockRequest {
  string order_id = 1;
}

message VectorClockResponse {
  int32 suggestions = 1;
  int32 fraud_detection = 2;
  int32 fd_event_d = 3;
  int32 fd_event_e = 4;
  int32 transaction_verification = 5;
  int32 tv_event_a = 6;
  int32 tv_event_b = 7;
  int32 tv_event_c = 8;
}

message ClearOrderRequest {
  string order_id = 1;
  int32 final_vc_suggestions = 2;
  int32 final_vc_fraud_detection = 3;
  int32 final_vc_fd_event_d = 4;
  int32 final_vc_fd_event_e = 5;
  int32 final_vc_transaction_verification = 6;
  int32 final_vc_tv_event_a = 7;
  int32 final_vc_tv_event_b = 8;
  int32 final_vc_tv_event_c = 9;
}

message ClearOrderResponse {
  bool success = 1;
  string message = 2;
}